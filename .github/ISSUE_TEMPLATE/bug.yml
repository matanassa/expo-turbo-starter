name: Bug report
description: Report reproducible starter behavior that is not working as expected
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest repository, branch, or exact steps that reproduce the issue.
      placeholder: |
        1. Create a repository from the template
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - Workspace tooling
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node, pnpm, Expo, device or simulator, and relevant command output.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I reproduced this on the latest `main` branch.
          required: true
        - label: I removed secrets and private application data from the report.
          required: true
